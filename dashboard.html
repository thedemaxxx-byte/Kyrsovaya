<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-QA Pipeline Dashboard — Котософт</title>
    <meta name="description" content="Dashboard for visualizing AI-QA Pipeline test results for котософт.рф">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-card-hover: #1e2a42;
            --bg-code: #0d1117;
            --border: #2a3550;
            --text-primary: #e8ecf4;
            --text-secondary: #8b95a8;
            --text-muted: #5a6478;
            --accent-green: #22c55e;
            --accent-green-bg: rgba(34,197,94,0.12);
            --accent-red: #ef4444;
            --accent-red-bg: rgba(239,68,68,0.12);
            --accent-yellow: #eab308;
            --accent-yellow-bg: rgba(234,179,8,0.12);
            --accent-blue: #3b82f6;
            --accent-blue-bg: rgba(59,130,246,0.12);
            --accent-purple: #a855f7;
            --accent-purple-bg: rgba(168,85,247,0.12);
            --accent-cyan: #06b6d4;
            --accent-cyan-bg: rgba(6,182,212,0.12);
            --gradient-1: linear-gradient(135deg, #3b82f6, #a855f7);
            --gradient-2: linear-gradient(135deg, #22c55e, #06b6d4);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.4);
            --shadow-card: 0 4px 16px rgba(0,0,0,0.3);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse 800px 600px at 20% 30%, rgba(59,130,246,0.06), transparent),
                radial-gradient(ellipse 600px 400px at 80% 60%, rgba(168,85,247,0.05), transparent),
                radial-gradient(ellipse 500px 300px at 50% 90%, rgba(34,197,94,0.04), transparent);
            z-index: 0;
            pointer-events: none;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

        /* Header */
        .header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo {
            width: 48px; height: 48px;
            background: var(--gradient-1);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 800;
            box-shadow: 0 4px 20px rgba(59,130,246,0.3);
        }
        .header-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .btn-group { display: flex; gap: 8px; }
        .btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary); font-family: inherit; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.25s ease; text-decoration: none;
        }
        .btn:hover { background: var(--bg-card-hover); border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(59,130,246,0.15); }
        .btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .btn.primary:hover { background: #2563eb; }
        .btn.loading .refresh-icon { animation: spin 0.8s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg-card); border-radius: var(--radius-sm); padding: 4px; border: 1px solid var(--border); }
        .tab {
            padding: 10px 20px; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            color: var(--text-secondary); transition: all 0.25s ease;
            border: none; background: none; font-family: inherit;
        }
        .tab:hover { color: var(--text-primary); }
        .tab.active { background: var(--accent-blue-bg); color: var(--accent-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
        .stat-card.green::before { background: var(--gradient-2); }
        .stat-card.red::before { background: linear-gradient(90deg, #ef4444, #f97316); }
        .stat-card.blue::before { background: var(--gradient-1); }
        .stat-card.purple::before { background: linear-gradient(90deg, #a855f7, #ec4899); }
        .stat-card.cyan::before { background: linear-gradient(90deg, #06b6d4, #22c55e); }
        .stat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-value { font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
        .stat-card.green .stat-value { color: var(--accent-green); }
        .stat-card.red .stat-value { color: var(--accent-red); }
        .stat-card.blue .stat-value { color: var(--accent-blue); }
        .stat-card.purple .stat-value { color: var(--accent-purple); }
        .stat-card.cyan .stat-value { color: var(--accent-cyan); }
        .stat-extra { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

        /* Section title */
        .section-title {
            font-size: 18px; font-weight: 700; margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title .icon {
            width: 28px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        /* Runs list */
        .runs-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
        .run-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; transition: all 0.3s ease; cursor: pointer;
        }
        .run-card:hover { border-color: var(--accent-blue); box-shadow: 0 0 30px rgba(59,130,246,0.08); }
        .run-card.expanded { border-color: var(--accent-blue); }
        .run-header { display: flex; align-items: center; padding: 18px 24px; gap: 16px; }
        .run-status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; position: relative; }
        .run-status-dot.success { background: var(--accent-green); box-shadow: 0 0 12px rgba(34,197,94,0.5); }
        .run-status-dot.failure { background: var(--accent-red); box-shadow: 0 0 12px rgba(239,68,68,0.5); }
        .run-status-dot.success::after {
            content: ''; position: absolute; inset: -3px; border-radius: 50%;
            border: 2px solid rgba(34,197,94,0.3); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(1.5); } }
        .run-info { flex: 1; min-width: 0; }
        .run-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
        .run-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .run-meta span { display: flex; align-items: center; gap: 4px; }
        .run-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .run-badge.success { background: var(--accent-green-bg); color: var(--accent-green); }
        .run-badge.failure { background: var(--accent-red-bg); color: var(--accent-red); }
        .run-duration { font-size: 13px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
        .run-chevron { color: var(--text-muted); transition: transform 0.3s ease; flex-shrink: 0; }
        .run-card.expanded .run-chevron { transform: rotate(180deg); }

        /* Steps panel */
        .steps-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .run-card.expanded .steps-panel { max-height: 2000px; }
        .steps-content { padding: 0 24px 20px; border-top: 1px solid var(--border); }
        .step-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(42,53,80,0.5); }
        .step-item:last-child { border-bottom: none; }
        .step-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .step-icon.success { background: var(--accent-green-bg); color: var(--accent-green); }
        .step-icon.failure { background: var(--accent-red-bg); color: var(--accent-red); }
        .step-icon.skipped { background: var(--accent-yellow-bg); color: var(--accent-yellow); }
        .step-name { flex: 1; font-size: 13px; font-weight: 500; }
        .step-duration { font-size: 12px; color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }

        /* Timeline */
        .timeline-chart {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; display: flex; align-items: flex-end; gap: 8px; height: 200px; overflow-x: auto;
        }
        .timeline-bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; min-width: 60px; }
        .timeline-bar { width: 100%; max-width: 48px; border-radius: 6px 6px 2px 2px; min-height: 8px; transition: all 0.5s ease; }
        .timeline-bar.success { background: linear-gradient(180deg, var(--accent-green), rgba(34,197,94,0.6)); }
        .timeline-bar.failure { background: linear-gradient(180deg, var(--accent-red), rgba(239,68,68,0.6)); }
        .timeline-bar:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(59,130,246,0.2); }
        .timeline-label { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
        .timeline-duration-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; }

        /* Code block */
        .code-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; margin-bottom: 24px;
        }
        .code-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border);
        }
        .code-filename { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .code-lang-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: var(--accent-blue-bg); color: var(--accent-blue); }
        .code-body {
            padding: 20px; overflow-x: auto;
            font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.7;
            color: #c9d1d9; background: var(--bg-code);
        }
        .code-body pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }

        /* Syntax highlights */
        .kw { color: #ff7b72; }
        .fn { color: #d2a8ff; }
        .str { color: #a5d6ff; }
        .cmt { color: #8b949e; font-style: italic; }
        .num { color: #79c0ff; }
        .dec { color: #ffa657; }

        /* Test description cards */
        .test-desc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .test-desc-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; transition: all 0.3s ease;
        }
        .test-desc-card:hover { border-color: var(--accent-cyan); box-shadow: 0 0 24px rgba(6,182,212,0.1); }
        .test-desc-num {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; margin-bottom: 12px;
        }
        .test-desc-card:nth-child(1) .test-desc-num { background: var(--accent-blue-bg); color: var(--accent-blue); }
        .test-desc-card:nth-child(2) .test-desc-num { background: var(--accent-green-bg); color: var(--accent-green); }
        .test-desc-card:nth-child(3) .test-desc-num { background: var(--accent-purple-bg); color: var(--accent-purple); }
        .test-desc-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .test-desc-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .test-desc-tag {
            display: inline-block; padding: 3px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 600; margin-top: 12px;
        }
        .tag-e2e { background: var(--accent-blue-bg); color: var(--accent-blue); }
        .tag-api { background: var(--accent-green-bg); color: var(--accent-green); }
        .tag-dify { background: var(--accent-purple-bg); color: var(--accent-purple); }

        /* Dify response section */
        .dify-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; margin-bottom: 24px;
        }
        .dify-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .dify-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--gradient-1); display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .dify-title { font-size: 16px; font-weight: 700; }
        .dify-subtitle { font-size: 12px; color: var(--text-secondary); }
        .dify-field { margin-bottom: 16px; }
        .dify-field-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); margin-bottom: 6px;
        }
        .dify-field-value {
            background: var(--bg-code); border: 1px solid var(--border); border-radius: 8px;
            padding: 14px 16px; font-size: 13px; line-height: 1.6; color: var(--text-primary);
            white-space: pre-wrap; word-wrap: break-word;
            font-family: 'JetBrains Mono', monospace;
            max-height: 300px; overflow-y: auto;
        }

        /* Artifacts link */
        .artifacts-link {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: var(--accent-purple-bg);
            border: 1px solid rgba(168,85,247,0.3); border-radius: 8px;
            color: var(--accent-purple); font-size: 13px; font-weight: 600;
            text-decoration: none; transition: all 0.25s ease; margin-top: 8px;
        }
        .artifacts-link:hover { background: rgba(168,85,247,0.2); border-color: var(--accent-purple); }

        /* Loading */
        .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .loading-text { font-size: 14px; color: var(--text-secondary); }

        /* Error */
        .error-box { background: var(--accent-red-bg); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 24px; text-align: center; }
        .error-box h3 { color: var(--accent-red); margin-bottom: 8px; }
        .error-box p { color: var(--text-secondary); font-size: 14px; }

        .footer { padding: 24px 0; border-top: 1px solid var(--border); text-align: center; margin-top: 40px; }
        .footer p { font-size: 12px; color: var(--text-muted); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        .animate-in:nth-child(1) { animation-delay: 0.05s; }
        .animate-in:nth-child(2) { animation-delay: 0.1s; }
        .animate-in:nth-child(3) { animation-delay: 0.15s; }
        .animate-in:nth-child(4) { animation-delay: 0.2s; }
        .animate-in:nth-child(5) { animation-delay: 0.25s; }

        /* Info callout */
        .info-callout {
            background: var(--accent-blue-bg); border: 1px solid rgba(59,130,246,0.25);
            border-radius: var(--radius-sm); padding: 16px 20px; margin-bottom: 24px;
            display: flex; align-items: flex-start; gap: 12px;
        }
        .info-callout-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
        .info-callout-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
        .info-callout-text strong { color: var(--accent-blue); }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .run-header { padding: 14px 16px; flex-wrap: wrap; }
            .stat-value { font-size: 28px; }
            .test-desc-grid { grid-template-columns: 1fr; }
            .tabs { overflow-x: auto; }
        }
    </style>
</head>

        const OWNER = 'thedemaxxx-byte';
        const REPO = 'Kyrsovaya';
        const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}`;

        // ---- Tab switching ----
        function switchTab(name, evt) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (evt && evt.target) evt.target.classList.add('active');
            else document.querySelector(`.tab[onclick*="${name}"]`)?.classList.add('active');
            document.getElementById(`tab-${name}`).classList.add('active');
        }

        // ---- Helpers ----
        function formatDuration(startStr, endStr) {
            if (!startStr || !endStr) return '—';
            const diff = Math.round((new Date(endStr) - new Date(startStr)) / 1000);
            if (diff < 60) return `${diff}с`;
            return `${Math.floor(diff / 60)}м ${diff % 60}с`;
        }
        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        function getDurationSeconds(s, e) { return s && e ? Math.round((new Date(e) - new Date(s)) / 1000) : 0; }
        function getStepIcon(c) { return c === 'success' ? '✓' : c === 'failure' ? '✗' : '⊘'; }
        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // ---- Syntax highlight (simple) ----
        function highlightPython(code) {
            return code
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/(#.*)/gm, '<span class="cmt">$1</span>')
                .replace(/(&quot;.*?&quot;|".*?"|'.*?')/g, '<span class="str">$1</span>')
                .replace(/\b(import|from|def|class|if|else|elif|return|assert|in|not|and|or|with|as|for|while|try|except|raise|True|False|None)\b/g, '<span class="kw">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
                .replace(/@(\w+)/g, '<span class="dec">@$1</span>');
        }

        // ---- Load Overview ----
        async function loadOverview() {
            try {
            let runs = [];
            let jobsResults = [];
            let total = 0, success = 0, failed = 0, avgDur = 0, totalTestSteps = 0;

            if (LOCAL_DATA && LOCAL_DATA.history && LOCAL_DATA.history.length > 0) {
                console.log("Loading overview from LOCAL_DATA");
                runs = LOCAL_DATA.history;
                jobsResults = runs.map(r => ({ jobs: r.jobs || [] }));
                total = runs.length;
                success = runs.filter(r => r.conclusion === 'success').length;
                failed = runs.filter(r => r.conclusion === 'failure').length;
                
                const totalDur = runs.reduce((s, r) => {
                    const d = getDurationSeconds(r.run_started_at, r.updated_at);
                    return s + (d > 0 ? d : (r.duration_seconds || 0));
                }, 0);
                avgDur = totalDur / (total || 1);
                
                jobsResults.forEach(jr => {
                    (jr.jobs || []).forEach(j => {
                        totalTestSteps += (j.steps || []).filter(s => !s.name.startsWith('Set up') && !s.name.startsWith('Post ') && !s.name.startsWith('Complete')).length;
                    });
                });
            } else {
                console.log("Fetching overview from GitHub API");
                const runsResp = await fetch(`${API_BASE}/actions/runs?per_page=10`);
                if (!runsResp.ok) throw new Error(`GitHub API: ${runsResp.status}`);
                const runsData = await runsResp.json();
                runs = runsData.workflow_runs || [];
                if (!runs.length) { document.getElementById('overview-content').innerHTML = '<div class="error-box"><h3>Нет запусков</h3><p>Pipeline ещё не запускался.</p></div>'; return; }

                jobsResults = await Promise.all(runs.map(r => fetch(`${API_BASE}/actions/runs/${r.id}/jobs`).then(j => j.json())));
                total = runs.length;
                success = runs.filter(r => r.conclusion==='success').length;
                failed = runs.filter(r => r.conclusion==='failure').length;
                avgDur = runs.reduce((s,r) => s + getDurationSeconds(r.run_started_at, r.updated_at), 0) / total;

                jobsResults.forEach(jr => {
                    (jr.jobs || []).forEach(j => {
                        totalTestSteps += (j.steps || []).filter(s => !s.name.startsWith('Set up') && !s.name.startsWith('Post ') && !s.name.startsWith('Complete')).length;
                    });
                });
            }

            let html = `
            <div class="stats-grid">
                <div class="stat-card blue animate-in"><div class="stat-label">Всего запусков</div><div class="stat-value">${total}</div><div class="stat-extra">За всё время</div></div>
                <div class="stat-card green animate-in"><div class="stat-label">Успешных</div><div class="stat-value">${success}</div><div class="stat-extra">${total ? Math.round(success/total*100) : 0}% success rate</div></div>
                <div class="stat-card red animate-in"><div class="stat-label">С ошибками</div><div class="stat-value">${failed}</div><div class="stat-extra">${total ? Math.round(failed/total*100) : 0}% failure rate</div></div>
                <div class="stat-card purple animate-in"><div class="stat-label">Сред. время</div><div class="stat-value">${Math.round(avgDur)}с</div><div class="stat-extra">Среднее выполнение</div></div>
                <div class="stat-card cyan animate-in"><div class="stat-label">Шагов выполнено</div><div class="stat-value">${totalTestSteps}</div><div class="stat-extra">По всем запускам</div></div>
            </div>`;

            // Timeline
            const maxDur = Math.max(...runs.map(r => {
                const d = getDurationSeconds(r.run_started_at, r.updated_at);
                return d > 0 ? d : (r.duration_seconds || 1);
            }), 1);
            const bars = runs.slice().reverse().map(r => {
                const rawDur = getDurationSeconds(r.run_started_at, r.updated_at);
                const dur = rawDur > 0 ? rawDur : (r.duration_seconds || 0);
                const h = Math.max(8, (dur / maxDur) * 120);
                const cls = r.conclusion === 'success' ? 'success' : 'failure';
                const durLabel = rawDur > 0 ? formatDuration(r.run_started_at, r.updated_at) : `${dur}с`;
                return `<div class="timeline-bar-wrapper"><div class="timeline-duration-label">${durLabel}</div><div class="timeline-bar ${cls}" style="height:${h}px" title="Run #${r.run_number}: ${r.conclusion}"></div><div class="timeline-label">#${r.run_number}</div></div>`;
            }).join('');
            html += `<h2 class="section-title"><span class="icon" style="background:var(--accent-blue-bg);color:var(--accent-blue)">📊</span>Хронология запусков</h2><div class="timeline-chart">${bars}</div><br>`;

            // Runs list
            html += `<h2 class="section-title"><span class="icon" style="background:var(--accent-purple-bg);color:var(--accent-purple)">🔬</span>Подробности запусков</h2><div class="runs-list">`;
            runs.forEach((run, i) => {
                const jobs = jobsResults[i].jobs || [];
                const cls = run.conclusion === 'success' ? 'success' : 'failure';
                const badge = run.conclusion === 'success' ? 'Успех' : 'Ошибка';
                let steps = '';
                jobs.forEach(j => (j.steps||[]).forEach(s => {
                    const stepDur = s.started_at && s.completed_at ? formatDuration(s.started_at, s.completed_at) : (s.duration_seconds ? `${s.duration_seconds}с` : '—');
                    steps += `<div class="step-item"><div class="step-icon ${s.conclusion||'skipped'}">${getStepIcon(s.conclusion)}</div><span class="step-name">${escapeHtml(s.name)}</span><span class="step-duration">${stepDur}</span></div>`;
                }));
                const runTitle = run.display_title || `Run #${run.run_number}`;
                const runDate = run.created_at ? formatDate(run.created_at) : (run.run_started_at ? formatDate(run.run_started_at) : '—');
                const runDuration = run.run_started_at && run.updated_at ? formatDuration(run.run_started_at, run.updated_at) : (run.duration_seconds ? `${run.duration_seconds}с` : '—');
                html += `
                <div class="run-card animate-in" id="run-${run.id}" onclick="toggleRun('run-${run.id}')">
                    <div class="run-header">
                        <div class="run-status-dot ${cls}"></div>
                        <div class="run-info">
                            <div class="run-name">${escapeHtml(runTitle)} #${run.run_number}</div>
                            <div class="run-meta"><span>📅 ${runDate}</span><span>🔀 ${run.head_branch || 'main'}</span><span>⚡ ${run.event || 'dispatch'}</span></div>
                        </div>
                        <span class="run-badge ${cls}">${badge}</span>
                        <span class="run-duration">⏱ ${runDuration}</span>
                        <svg class="run-chevron" width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
                    </div>
                    <div class="steps-panel"><div class="steps-content">${steps}</div></div>
                </div>`;
            });
            html += `</div>`;
            document.getElementById('overview-content').innerHTML = html;
            } catch (err) {
                document.getElementById('overview-content').innerHTML = `<div class="error-box"><h3>Ошибка загрузки</h3><p>${escapeHtml(err.message)}</p><p style="font-size:12px;color:var(--text-muted);margin-top:8px;">GitHub API имеет лимит 60 запросов/час без авторизации. Попробуйте позже.</p></div>`;

                    <span class="info-callout-icon">ℹ️</span>
                    <div class="info-callout-text">
                        Ниже показан <strong>исходный код всех тестов</strong>, которые выполняются при каждом запуске pipeline.
                        При запуске через Dify (repository_dispatch) также создаётся <strong>test_dynamic.py</strong> — файл с тестами, сгенерированными AI на основе ваших требований.
                        Для просмотра <strong>результатов конкретного запуска</strong> — переключитесь на вкладку «Dify AI».
                    </div>
                </div>

                <h2 class="section-title"><span class="icon" style="background:var(--accent-cyan-bg);color:var(--accent-cyan)">📋</span>Что проверяют тесты</h2>
                <div class="test-desc-grid">
                    <div class="test-desc-card animate-in">
                        <div class="test-desc-num">1</div>
                        <div class="test-desc-title">UI E2E: Доступность и текст «Котософт»</div>
                        <div class="test-desc-text">
                            Открывает сайт котософт.рф в реальном браузере (Playwright), ждёт полной загрузки страницы и проверяет, что на странице присутствует текст «Котософт».
                            Это подтверждает: сайт доступен, рендерится, ключевой контент отображается.
                        </div>
                        <span class="test-desc-tag tag-e2e">E2E · Playwright</span>
                    </div>
                    <div class="test-desc-card animate-in">
                        <div class="test-desc-num">2</div>
                        <div class="test-desc-title">API Smoke: HTTP статус 200</div>
                        <div class="test-desc-text">
                            Отправляет HTTP GET-запрос к сайту котософт.рф и проверяет, что сервер возвращает код 200 (OK).
                            Это Smoke-тест: быстрая проверка, что сервер жив и отвечает корректно.
                        </div>
                        <span class="test-desc-tag tag-api">API · Requests</span>
                    </div>
                    <div class="test-desc-card animate-in">
                        <div class="test-desc-num">3</div>
                        <div class="test-desc-title">Динамические тесты от Dify AI</div>
                        <div class="test-desc-text">
                            Когда вы заполняете поле «requirements_text» в Dify, AI генерирует Python-тесты на основе ваших требований.
                            Код записывается в test_dynamic.py и выполняется вместе с основными тестами.
                        </div>
                        <span class="test-desc-tag tag-dify">AI Generated · Dify</span>
                    </div>
                </div>

                <h2 class="section-title"><span class="icon" style="background:var(--accent-blue-bg);color:var(--accent-blue)">📝</span>Исходный код: test_kotosoft.py</h2>
                <div class="code-card">
                    <div class="code-header">
                        <span class="code-filename">📄 test_kotosoft.py</span>
                        <span class="code-lang-badge">Python</span>
                    </div>
                    <div class="code-body"><pre>${highlightPython(testCode)}</pre></div>
                </div>`;

                if (sendCode) {
                    html += `
                    <h2 class="section-title"><span class="icon" style="background:var(--accent-green-bg);color:var(--accent-green)">📤</span>Отправка результатов: send_results.py</h2>
                    <div class="code-card">
                        <div class="code-header">
                            <span class="code-filename">📄 send_results.py</span>
                            <span class="code-lang-badge">Python</span>
                        </div>
                        <div class="code-body"><pre>${highlightPython(sendCode)}</pre></div>
                    </div>`;
                }

                document.getElementById('tests-content').innerHTML = html;
            } catch (err) {
                document.getElementById('tests-content').innerHTML = `<div class="error-box"><h3>Ошибка</h3><p>${err.message}</p></div>`;
            }
        }

        // ---- Load Dify ----
        async function loadDify() {
            let html = '';
            let latestRunUrl = '#';
            let latestRequirements = 'Проверка доступности сайта котософт.рф, наличия текста Котософт и элемента Салют';
            let difyResponseText = 'Нет данных ответа Dify.';
            let logsText = 'Логи pytest отсутствуют.';
            let allureText = 'Данные Allure отсутствуют.';

            if (LOCAL_DATA && LOCAL_DATA.latest_run) {
                console.log("Loading Dify data from LOCAL_DATA");
                const lr = LOCAL_DATA.latest_run;
                latestRunUrl = lr.html_url || '#';
                latestRequirements = lr.requirements_text || latestRequirements;
                difyResponseText = lr.dify_response || difyResponseText;
                logsText = lr.pytest_logs || logsText;
                allureText = lr.allure_data ? (typeof lr.allure_data === 'string' ? lr.allure_data : JSON.stringify(lr.allure_data, null, 2)) : allureText;
            } else {
                console.log("Loading Dify data from GitHub API / default values");
                try {
                    const runsResp = await fetch(`${API_BASE}/actions/runs?per_page=1`);
                    if (runsResp.ok) {
                        const runsData = await runsResp.json();
                        const runs = runsData.workflow_runs || [];
                        if (runs.length > 0) {
                            latestRunUrl = runs[0].html_url || '#';
                        }
                    }
                } catch(e) { /* use defaults */ }
            }

            html += `
            <div class="info-callout">
                <span class="info-callout-icon">🤖</span>
                <div class="info-callout-text">
                    Эта секция показывает <strong>что именно отправлялось в Dify</strong> при последнем запуске и <strong>какой ответ получен</strong>.
                    Данные извлечены из шага «Send results to Dify» в GitHub Actions.
                    <br><br>
                    <strong>Как посмотреть полные логи Dify:</strong>
                    <br>1. Откройте <a href="https://cloud.dify.ai" target="_blank" style="color:var(--accent-blue)">cloud.dify.ai</a> → Студия → AI-QA-Engine-Pipeline → Логи
                    <br>2. Каждый запуск виден отдельной записью с входными и выходными данными
                </div>
            </div>`;

            // Show pipeline flow
            html += `
            <h2 class="section-title"><span class="icon" style="background:var(--accent-purple-bg);color:var(--accent-purple)">⚡</span>Как работает AI Pipeline</h2>
            <div class="dify-card">
                <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:center;">
                    <div style="text-align:center; padding:16px 20px; background:var(--accent-blue-bg); border-radius:12px; min-width:140px;">
                        <div style="font-size:24px; margin-bottom:6px;">%TEXT%</div>
                        <div style="font-size:12px; font-weight:700; color:var(--accent-blue);">1. Ввод требований</div>
                        <div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">requirements_text</div>
                    </div>
                    <div style="font-size:20px; color:var(--text-muted);">→</div>
                    <div style="text-align:center; padding:16px 20px; background:var(--accent-purple-bg); border-radius:12px; min-width:140px;">
                        <div style="font-size:24px; margin-bottom:6px;">🤖</div>
                        <div style="font-size:12px; font-weight:700; color:var(--accent-purple);">2. Dify AI</div>
                        <div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">Генерация тестов</div>
                    </div>
                    <div style="font-size:20px; color:var(--text-muted);">→</div>
                    <div style="text-align:center; padding:16px 20px; background:var(--accent-green-bg); border-radius:12px; min-width:140px;">
                        <div style="font-size:24px; margin-bottom:6px;">⚙️</div>
                        <div style="font-size:12px; font-weight:700; color:var(--accent-green);">3. GitHub Actions</div>
                        <div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">Запуск тестов</div>
                    </div>
                    <div style="font-size:20px; color:var(--text-muted);">→</div>
                    <div style="text-align:center; padding:16px 20px; background:var(--accent-cyan-bg); border-radius:12px; min-width:140px;">
                        <div style="font-size:24px; margin-bottom:6px;">📊</div>
                        <div style="font-size:12px; font-weight:700; color:var(--accent-cyan);">4. Результаты</div>
                        <div style="font-size:11px; color:var(--text-secondary); margin-top:4px;">Allure + Dify отчёт</div>
                    </div>
                </div>
            </div>`;

            // Dify Response from AI Analysis (New section!)
            html += `
            <h2 class="section-title"><span class="icon" style="background:var(--accent-blue-bg);color:var(--accent-blue)">🧠</span>Анализ и отчет Dify AI (Результат последнего запуска)</h2>
            <div class="dify-card">
                <div class="dify-field">
                    <div class="dify-field-label">🤖 Анализ от Dify AI</div>
                    <div class="dify-field-value" style="font-family: inherit; font-size: 14px; max-height: none;">${escapeHtml(difyResponseText)}</div>
                </div>
            </div>`;

            // Show what send_results.py sends
            html += `
            <h2 class="section-title"><span class="icon" style="background:var(--accent-green-bg);color:var(--accent-green)">📤</span>Сырые данные последнего запуска</h2>
            <div class="dify-card">
                <div class="dify-field">
                    <div class="dify-field-label">📋 requirements_text (ваше задание)</div>
                    <div class="dify-field-value">${escapeHtml(latestRequirements)}</div>
                </div>
                <div class="dify-field">
                    <div class="dify-field-label">📄 execution_logs (логи pytest)</div>
                    <div class="dify-field-value" style="font-size: 12px;">${escapeHtml(logsText)}</div>
                </div>
                <div class="dify-field">
                    <div class="dify-field-label">📊 allure_json_data (JSON данные Allure)</div>
                    <div class="dify-field-value" style="font-size: 12px;">${escapeHtml(allureText)}</div>
                </div>
            </div>

            <h2 class="section-title"><span class="icon" style="background:var(--accent-blue-bg);color:var(--accent-blue)">🔗</span>Прямые ссылки</h2>
            <div style="display:flex; flex-wrap:wrap; gap:12px;">
                <a class="artifacts-link" href="https://cloud.dify.ai/app/87c5ff7a-923e-4db9-9a20-ec596cc397c2/logs" target="_blank">
                    📋 Логи Dify Workflow
                </a>
                <a class="artifacts-link" href="https://github.com/thedemaxxx-byte/Kyrsovaya/actions" target="_blank">
                    ⚙️ GitHub Actions Runs
                </a>
                <a class="artifacts-link" href="${latestRunUrl}" target="_blank" id="latestRunLink">
                    📦 Последний запуск — артефакты
                </a>
            </div>`;

            document.getElementById('dify-content').innerHTML = html.replace('%TEXT%', '📝');
        }

        // ---- Load all ----
        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            try {
                await Promise.all([loadOverview(), loadTests(), loadDify()]);
            } catch(e) {
                console.error(e);
            }
            btn.classList.remove('loading');
        }

        function toggleRun(id) { document.getElementById(id).classList.toggle('expanded'); }

        loadData();
    </script>
</body>
</html>
