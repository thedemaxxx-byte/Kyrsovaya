name: Kotosoft Automated Testing Pipeline
on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-dify-tests]
jobs:
  test-execution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright allure-pytest requests flake8
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Linting
        run: flake8 . --count --exit-zero --max-line-length=127 --statistics
      - name: Run Tests for котософт.рф
        run: pytest --alluredir=allure-results --log-cli-level=INFO > pytest_execution.log 2>&1
        continue-on-error: true
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20
      - name: Upload Artifacts for Dify AI
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-pipeline-outputs
          path: |
            pytest_execution.log
            allure-results/
      - name: Send results to Dify
        if: always()
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: python send_results.py

